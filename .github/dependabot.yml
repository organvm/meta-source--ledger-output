version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/apps/cipher-rendering"
      - "/apps/hierarchy-visualizer"
      - "/apps/identity-playground"
      - "/apps/mythology-playground"
      - "/packages/core"
      - "/packages/utils"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      npm-deps:
        patterns: ["*"]
  - package-ecosystem: "github-actions"
    directories:
      - "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      github-actions-deps:
        patterns: ["*"]
